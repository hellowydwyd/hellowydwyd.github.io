<script>
document.addEventListener('DOMContentLoaded', function() {
  // 修复头部结构
  const header = document.querySelector('.header');
  if (header) {
    // 创建统一的头部内容容器
    const headerContent = document.createElement('div');
    headerContent.className = 'header-content';
    
    // 获取品牌标志和导航菜单
    const brandContainer = header.querySelector('.site-brand-container');
    const siteNav = header.querySelector('.site-nav');
    
    if (brandContainer && siteNav) {
      // 将它们移动到新的容器中
      headerContent.appendChild(brandContainer);
      headerContent.appendChild(siteNav);
      
      // 清空header并添加新容器
      header.innerHTML = '';
      header.appendChild(headerContent);
    }
  }
  
  // 检查是否在首页
  const isHomePage = window.location.pathname === '/' || 
                     window.location.pathname === '/index.html' || 
                     window.location.pathname.endsWith('/');
  
  if (isHomePage) {
    // 创建现代化英雄区域
    const heroSection = document.createElement('div');
    heroSection.className = 'hero-section';
    heroSection.innerHTML = `
      <div class="hero-background"></div>
      <div class="hero-content">
        <h1 class="hero-title">Life Oriented Programming</h1>
        <p class="hero-subtitle">探索代码的宇宙，编织生活的程序</p>
        <div class="hero-buttons">
          <a href="/about/" class="hero-btn primary">
            <i class="fa fa-user"></i>
            了解我
          </a>
          <a href="/archives/" class="hero-btn secondary">
            <i class="fa fa-archive"></i>
            查看文章
          </a>
        </div>
        <div class="scroll-indicator">
          <div class="scroll-arrow"></div>
        </div>
      </div>
    `;
    
    // 插入到main元素之前
    const main = document.querySelector('.main');
    if (main) {
      main.parentNode.insertBefore(heroSection, main);
    }
    
    // 添加首页标识
    document.body.classList.add('home');
    document.documentElement.classList.add('home');
  }
  
  // 导航栏滚动效果 - 适用于所有页面
  const headerElement = document.querySelector('.header');
  if (headerElement) {
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      
      if (scrollY > 50) {
        headerElement.classList.add('scrolled');
      } else {
        headerElement.classList.remove('scrolled');
      }
    });
  }
  
  // 移动端导航切换
  const navToggle = document.querySelector('.site-nav-toggle');
  const nav = document.querySelector('.site-nav');
  
  if (navToggle && nav) {
    navToggle.addEventListener('click', function() {
      nav.classList.toggle('show');
      
      // 切换汉堡菜单动画
      const toggleLines = navToggle.querySelectorAll('.toggle-line');
      toggleLines.forEach((line, index) => {
        if (nav.classList.contains('show')) {
          if (index === 0) line.style.transform = 'rotate(45deg) translate(5px, 5px)';
          if (index === 1) line.style.opacity = '0';
          if (index === 2) line.style.transform = 'rotate(-45deg) translate(7px, -6px)';
        } else {
          line.style.transform = '';
          line.style.opacity = '';
        }
      });
    });
    
    // 点击菜单项时关闭移动端菜单
    const menuItems = nav.querySelectorAll('.menu-item-link');
    menuItems.forEach(item => {
      item.addEventListener('click', () => {
        nav.classList.remove('show');
        const toggleLines = navToggle.querySelectorAll('.toggle-line');
        toggleLines.forEach(line => {
          line.style.transform = '';
          line.style.opacity = '';
        });
      });
    });
  }
  
  // 平滑滚动到内容区域
  const scrollIndicator = document.querySelector('.scroll-indicator');
  if (scrollIndicator) {
    scrollIndicator.addEventListener('click', () => {
      const mainContent = document.querySelector('.home .main-inner');
      if (mainContent) {
        mainContent.scrollIntoView({ behavior: 'smooth' });
      }
    });
  }
  
  // 为当前页面的导航项添加激活状态
  const currentPath = window.location.pathname;
  const menuItems = document.querySelectorAll('.menu-item');
  
  menuItems.forEach(item => {
    const link = item.querySelector('.menu-item-link');
    if (link && link.getAttribute('href') === currentPath) {
      item.classList.add('menu-item-active');
    }
  });
});
</script>
